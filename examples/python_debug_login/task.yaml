id: python-debug-login
title: Fix login validation bug
type: debug
repo: ../..
description: >
  The sample Python login app rejects valid users when the stored password
  contains leading or trailing whitespace.
instructions: >
  Diagnose the login validation behavior and make the smallest code change that
  allows valid credentials to pass while preserving failed login behavior.
success_criteria:
  - Valid credentials authenticate successfully.
  - Invalid credentials are rejected.
  - Existing public function names remain unchanged.
test_commands:
  - name: pytest
    command: pytest examples/python_debug_login/repo/tests
    timeout_seconds: 120
test:
  commands:
    - name: pytest
      command: pytest examples/python_debug_login/repo/tests
      timeout_seconds: 120
constraints:
  - kind: max_files_changed
    value: "3"
    description: Keep the debug fix focused.
  - kind: max_diff_lines
    value: "200"
    description: Prefer a focused patch.
metadata:
  difficulty: easy
  language: python
